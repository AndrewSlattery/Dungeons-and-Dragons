<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backgrounds Reference — D&D 2024</title>
  <style>
    /* ── Variables ───────────────────────────────────────── */
    :root {
      --bg:        #12111a;
      --panel:     #f5e6c8;
      --panel-alt: #ede0bb;
      --panel-head:#e8d5a8;
      --ink:       #2b1e0e;
      --ink-muted: #5a4632;
      --red:       #9e1c1c;
      --red-dark:  #6e1010;
      --gold:      #c9a228;
      --gold-light:#e8c84a;
      --shadow:    0 2px 12px rgba(0,0,0,.55);
      --radius:    6px;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #1c0a0a 0%, #2a0e0e 100%);
      border-bottom: 3px solid var(--gold);
      padding: .8rem 1.5rem;
      display: flex;
      align-items: center;
      gap: .85rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    header h1 {
      color: var(--gold);
      font-size: 1.6rem;
      letter-spacing: .05em;
      text-shadow: 1px 1px 3px #000;
    }
    .edition-badge {
      background: var(--gold);
      color: #2b1e0e;
      font-size: .68rem;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: .1em;
      text-transform: uppercase;
      align-self: center;
    }
    #header-count {
      color: #a08060;
      font-size: .8rem;
      font-style: italic;
      margin-left: auto;
    }

    /* ── Controls bar ────────────────────────────────────── */
    #controls {
      background: #1a0f0f;
      border-bottom: 2px solid #3a2010;
      padding: .65rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: .65rem;
      align-items: center;
      flex-shrink: 0;
    }
    #search {
      padding: .38rem .7rem;
      border: 1px solid #6a4030;
      border-radius: 4px;
      background: #2a1a10;
      color: #ddc090;
      font-family: inherit;
      font-size: .83rem;
      width: 240px;
    }
    #search::placeholder { color: #6a4a38; }
    #search:focus { outline: 1px solid var(--gold); }

    .filter-group {
      display: flex;
      align-items: center;
      gap: .35rem;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: .68rem;
      color: #6a5040;
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    /* Ability filter pills */
    .pill {
      padding: .22rem .6rem;
      border-radius: 10px;
      border: 1px solid #4a2a18;
      background: #221410;
      color: #8a6850;
      font-size: .7rem;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: .04em;
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
      user-select: none;
    }
    .pill:hover { background: #3a1e10; color: #ddc090; border-color: #7a4a28; }
    .pill.active { color: #fff; border-color: transparent; }
    .pill[data-val="Strength"].active    { background: #8a1818; }
    .pill[data-val="Dexterity"].active   { background: #236523; }
    .pill[data-val="Constitution"].active{ background: #7a4808; }
    .pill[data-val="Intelligence"].active{ background: #1a4280; }
    .pill[data-val="Wisdom"].active      { background: #206060; }
    .pill[data-val="Charisma"].active    { background: #6e2888; }

    #clear-btn {
      padding: .22rem .65rem;
      border-radius: 4px;
      border: 1px solid #4a2a18;
      background: transparent;
      color: #6a5040;
      font-size: .7rem;
      font-family: inherit;
      cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    #clear-btn:hover { color: #ddc090; border-color: #8a5030; }

    #result-count {
      font-size: .72rem;
      color: #6a5040;
      font-style: italic;
      margin-left: auto;
    }

    /* ── Card grid ───────────────────────────────────────── */
    main {
      flex: 1;
      padding: 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1rem;
      align-items: stretch;
    }

    /* ── Individual card ─────────────────────────────────── */
    .bg-card {
      background: var(--panel);
      border: 2px solid #b8a080;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .15s, box-shadow .15s, transform .12s;
    }
    .bg-card:hover {
      border-color: var(--gold);
      box-shadow: 0 5px 20px rgba(0,0,0,.7);
      transform: translateY(-2px);
    }
    .bg-card.homebrew { border-color: #a08848; }
    .bg-card.homebrew:hover { border-color: var(--gold-light); }

    /* Card header */
    .card-head {
      background: linear-gradient(135deg, #270d0d 0%, #3a1212 100%);
      padding: .6rem .85rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: .5rem;
    }
    .card-name {
      color: var(--gold);
      font-size: 1.0rem;
      font-weight: bold;
      letter-spacing: .04em;
      text-shadow: 1px 1px 3px #000;
    }
    .hb-label {
      font-size: .63rem;
      color: #b09050;
      font-style: italic;
      white-space: nowrap;
      letter-spacing: .03em;
    }

    /* Description */
    .card-desc {
      flex: 1;
      padding: .6rem .85rem .75rem;
      font-size: .76rem;
      font-style: italic;
      color: var(--ink-muted);
      line-height: 1.55;
      background: var(--panel-alt);
      border-top: 1px solid #d0bc98;
    }

    /* Stat rows */
    .card-stats {
      padding: .6rem .85rem .7rem;
      display: flex;
      flex-direction: column;
      gap: .38rem;
    }
    .stat-row {
      display: flex;
      align-items: flex-start;
      gap: .5rem;
      font-size: .78rem;
    }
    .slabel {
      font-size: .62rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--ink-muted);
      min-width: 68px;
      padding-top: 3px;
      font-weight: bold;
      flex-shrink: 0;
    }
    .sval { color: var(--ink); line-height: 1.45; }

    /* Ability chips */
    .ab-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .ab-chip {
      display: inline-block;
      font-size: .63rem;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 3px;
      color: #fff;
      letter-spacing: .05em;
      text-shadow: 0 1px 2px rgba(0,0,0,.4);
    }
    .str { background: #8a1818; }
    .dex { background: #236523; }
    .con { background: #7a4808; }
    .int { background: #1a4280; }
    .wis { background: #206060; }
    .cha { background: #6e2888; }

    /* Tool chip */
    .tool-chip {
      display: inline-block;
      font-size: .74rem;
      padding: 1px 8px;
      border-radius: 3px;
      background: #ddd0b0;
      color: var(--ink);
      border: 1px solid #b8a870;
    }

    /* Feat chip */
    .feat-chip {
      display: inline-block;
      font-size: .74rem;
      font-weight: bold;
      padding: 1px 8px;
      border-radius: 3px;
      background: var(--gold);
      color: #2b1e0e;
    }

    /* Equipment section */
    .card-equip {
      border-top: 1px solid #d0bc98;
      background: var(--panel);
    }
    .equip-head {
      padding: .35rem .85rem .15rem;
      font-size: .63rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: bold;
    }
    .equip-body {
      padding: 0 .85rem .65rem;
      font-size: .72rem;
      color: var(--ink-muted);
      line-height: 1.5;
    }
    .equip-opt-label {
      font-weight: bold;
      color: var(--red-dark);
      margin-top: .3rem;
      display: block;
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    /* No results */
    #no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: #5a4030;
      font-style: italic;
      padding: 3rem;
      font-size: .95rem;
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid #2a1810;
      padding: .6rem 1.5rem;
      font-size: .7rem;
      color: #4a3020;
      font-style: italic;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }
    footer span { color: #8a6840; }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1010; }
    ::-webkit-scrollbar-thumb { background: #4a3020; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6a4030; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 640px) {
      main { grid-template-columns: 1fr; padding: .85rem; }
      #search { width: 100%; }
      #header-count { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Backgrounds</h1>
  <span class="edition-badge">2024</span>
  <span id="header-count"></span>
</header>

<div id="controls">
  <input type="text" id="search" placeholder="Search by name, skill, feat, tool…">
  <div class="filter-group">
    <span class="filter-label">Ability:</span>
    <button class="pill" data-val="Strength">STR</button>
    <button class="pill" data-val="Dexterity">DEX</button>
    <button class="pill" data-val="Constitution">CON</button>
    <button class="pill" data-val="Intelligence">INT</button>
    <button class="pill" data-val="Wisdom">WIS</button>
    <button class="pill" data-val="Charisma">CHA</button>
    <button id="clear-btn">Clear</button>
  </div>
  <span id="result-count"></span>
</div>

<main id="grid"></main>

<footer>
  <span>† homebrew</span>
  <span>D&amp;D 2024 · backgrounds-reference.html</span>
</footer>

<script src="../data.js"></script>
<script>
  /* ── Constants ─────────────────────────────────────────── */
  const ABBR = {
    Strength: 'STR', Dexterity: 'DEX', Constitution: 'CON',
    Intelligence: 'INT', Wisdom: 'WIS', Charisma: 'CHA'
  };
  const CHIP_CLASS = {
    Strength: 'str', Dexterity: 'dex', Constitution: 'con',
    Intelligence: 'int', Wisdom: 'wis', Charisma: 'cha'
  };

  /* ── Data ──────────────────────────────────────────────── */
  const backgrounds = [...window.APP_DATA.backgrounds]
    .sort((a, b) => a.name.localeCompare(b.name));

  /* ── State ─────────────────────────────────────────────── */
  let activeAbilities = new Set();
  let searchText      = '';

  /* ── Helpers ───────────────────────────────────────────── */
  function toolLabel(t) {
    if (typeof t === 'string') return t;
    if (t && t.from) return `${t.from} (choice)`;
    return '';
  }

  function formatEquipItems(items, toolProf) {
    const toolName = typeof toolProf === 'string'
      ? toolProf
      : (toolProf && toolProf.from ? toolProf.from : 'tool');
    return items.map(i => {
      if (i.gp !== undefined) return `${i.gp} gp`;
      if (i.choose !== undefined)
        return i.choose === 'tool proficiency' ? toolName : i.choose;
      if (i.item) {
        let s = i.item;
        if (i.quantity) s += ` ×${i.quantity}`;
        if (i.note)     s += ` (${i.note})`;
        return s;
      }
      return '';
    }).filter(Boolean).join(', ');
  }

  /* ── Card builder ──────────────────────────────────────── */
  function buildCard(bg) {
    const isHB = !!bg.homebrew;
    const card = document.createElement('div');
    card.className = 'bg-card' + (isHB ? ' homebrew' : '');

    /* Header */
    const head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML =
      `<span class="card-name">${bg.name}</span>` +
      (isHB ? `<span class="hb-label">homebrew †</span>` : '');
    card.appendChild(head);

    /* Stats */
    const stats = document.createElement('div');
    stats.className = 'card-stats';

    // Abilities
    const chips = bg.abilityScores
      .map(a => `<span class="ab-chip ${CHIP_CLASS[a]}">${ABBR[a]}</span>`)
      .join('');
    stats.innerHTML +=
      `<div class="stat-row">
         <span class="slabel">Abilities</span>
         <span class="sval"><span class="ab-chips">${chips}</span></span>
       </div>`;

    // Skills
    stats.innerHTML +=
      `<div class="stat-row">
         <span class="slabel">Skills</span>
         <span class="sval">${bg.skillProficiencies.join(', ')}</span>
       </div>`;

    // Tool
    stats.innerHTML +=
      `<div class="stat-row">
         <span class="slabel">Tool</span>
         <span class="sval"><span class="tool-chip">${toolLabel(bg.toolProficiency)}</span></span>
       </div>`;

    // Feat
    stats.innerHTML +=
      `<div class="stat-row">
         <span class="slabel">Feat</span>
         <span class="sval"><span class="feat-chip">${bg.originFeat}</span></span>
       </div>`;

    card.appendChild(stats);

    /* Equipment (always visible) */
    if (bg.startingEquipment && bg.startingEquipment.length) {
      const equip = document.createElement('div');
      equip.className = 'card-equip';

      const head = document.createElement('div');
      head.className = 'equip-head';
      head.textContent = 'Starting Equipment';
      equip.appendChild(head);

      const body = document.createElement('div');
      body.className = 'equip-body';

      bg.startingEquipment.forEach(opt => {
        const label = document.createElement('span');
        label.className = 'equip-opt-label';
        label.textContent = `Option ${opt.option}`;
        body.appendChild(label);

        const line = document.createElement('p');
        line.textContent = formatEquipItems(opt.items, bg.toolProficiency);
        body.appendChild(line);
      });

      equip.appendChild(body);
      card.appendChild(equip);
    }

    /* Description (always last) */
    const desc = document.createElement('p');
    desc.className = 'card-desc';
    desc.textContent = bg.description;
    card.appendChild(desc);

    return card;
  }

  /* ── Filter logic ──────────────────────────────────────── */
  function matches(bg) {
    if (activeAbilities.size > 0 &&
        ![...activeAbilities].every(a => bg.abilityScores.includes(a))) return false;
    if (searchText) {
      const q = searchText.toLowerCase();
      const haystack = [
        bg.name,
        bg.description,
        ...bg.abilityScores.map(a => ABBR[a]),
        ...bg.skillProficiencies,
        toolLabel(bg.toolProficiency),
        bg.originFeat
      ].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  }

  /* ── Render ────────────────────────────────────────────── */
  function render() {
    const grid    = document.getElementById('grid');
    const visible = backgrounds.filter(matches);

    grid.innerHTML = '';
    if (visible.length === 0) {
      grid.innerHTML = '<div id="no-results">No backgrounds match your search.</div>';
    } else {
      visible.forEach(bg => grid.appendChild(buildCard(bg)));
    }

    document.getElementById('result-count').textContent =
      visible.length === backgrounds.length
        ? `${backgrounds.length} backgrounds`
        : `${visible.length} of ${backgrounds.length} shown`;

    const nCore = backgrounds.filter(b => !b.homebrew).length;
    const nHB   = backgrounds.filter(b =>  b.homebrew).length;
    document.getElementById('header-count').textContent =
      `${nCore} core · ${nHB} homebrew`;
  }

  /* ── Event listeners ───────────────────────────────────── */
  document.getElementById('search').addEventListener('input', e => {
    searchText = e.target.value.trim();
    render();
  });

  document.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.val;
      if (activeAbilities.has(val)) {
        activeAbilities.delete(val);
        btn.classList.remove('active');
      } else {
        activeAbilities.add(val);
        btn.classList.add('active');
      }
      render();
    });
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    activeAbilities = new Set();
    searchText      = '';
    document.getElementById('search').value = '';
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    render();
  });

  /* ── Init ──────────────────────────────────────────────── */
  render();
</script>
</body>
</html>
