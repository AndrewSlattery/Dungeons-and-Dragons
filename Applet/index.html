<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&amp;D 2024 · Character Creator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Character Creation</h1>
      <span class="edition-badge">D&amp;D 2024</span>
    </div>
  </header>

  <nav id="steps-nav"></nav>

  <div id="workspace">
    <main id="content"></main>
    <aside id="summary">
      <h2>Your Character</h2>
      <div id="summary-body"></div>
    </aside>
  </div>

  <footer id="footer-nav">
    <button id="btn-prev" class="btn btn-ghost" onclick="goPrev()">&#8592; Back</button>
    <span id="step-label"></span>
    <button id="btn-next" class="btn btn-primary" onclick="goNext()">Next &#8594;</button>
  </footer>

  <!-- data.js must be listed before app.js -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
